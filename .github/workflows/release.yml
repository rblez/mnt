name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...
      - run: go build -o mnt .
      - run: tar czf mnt-linux-amd64.tar.gz mnt
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "See the [commit log](https://github.com/${{ github.repository }}/commits/$GITHUB_REF_NAME) for changes." \
            mnt-linux-amd64.tar.gz
