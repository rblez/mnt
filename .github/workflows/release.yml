name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...
      - run: go build -o mnt .
      - run: tar czf mnt-linux-amd64.tar.gz mnt
      - uses: softprops/action-gh-release@v2
        with:
          files: mnt-linux-amd64.tar.gz
          generate_release_notes: true
